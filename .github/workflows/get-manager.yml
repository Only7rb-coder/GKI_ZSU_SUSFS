name: GetManager

# 适配 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write  # Allow writing to repository contents (for pushing tags)
  actions: read   # Allows triggering actions

on:
  workflow_call: # This allows this workflow to be called from another workflow
    outputs:
      susVer:
        description: "The fetched SUSFS version number"
        value: ${{ jobs.get_ksu_manager.outputs.susVer }}

      ksuVer:
        description: "The calculated KSU version number"
        value: ${{ jobs.get_ksu_manager.outputs.ksuVer }}

      expectedSize:
        description: "ZSU manager APK certificate size (hex)"
        value: ${{ jobs.get_ksu_manager.outputs.expectedSize }}

      expectedHash:
        description: "ZSU manager APK certificate SHA256 hash"
        value: ${{ jobs.get_ksu_manager.outputs.expectedHash }}

jobs:
  get_ksu_manager:
    runs-on: ubuntu-latest
    outputs:
      # 输出1: KSU版本号
      ksuVer: ${{ steps.get_version.outputs.kversion }}
      # 输出2: SUSFS版本号
      susVer: ${{ steps.get_version.outputs.sversion }}
      # 输出3: Manager certificate size
      expectedSize: ${{ steps.extract_cert.outputs.expected_size }}
      # 输出4: Manager certificate hash
      expectedHash: ${{ steps.extract_cert.outputs.expected_hash }}
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 🧐 Debug Workflow Caller Context
        run: |
          echo "==================== DEBUG CONTEXT ===================="
          echo " "
          echo "EVENT NAME: ${{ github.event_name }}"
          echo " "
          echo "--- CALLER INFORMATION ---"
          echo "  - Caller Repository: ${{ github.caller_repository }}"
          echo "  - Caller Workflow:   ${{ github.caller_workflow }}"
          echo "  - Caller User:       ${{ github.triggering_actor }}"
          echo " "
          echo "--- WORKFLOW & JOB INFORMATION ---"
          echo "  - Current Workflow:  ${{ github.workflow }}"
          echo "  - Current Job ID:    ${{ github.job }}"
          echo "  - Current Run ID:    ${{ github.run_id }}"
          echo "  - Current Run Number:${{ github.run_number }}"
          echo " "
          echo "--- GIT REFERENCE INFORMATION ---"
          echo "  - Git Ref:           ${{ github.ref }}"
          echo "  - Ref Type:          ${{ github.ref_type }}"
          echo " "
          echo "======================================================="
          
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl jq

      - name: 获取 KSU & SUSFS 版本
        id: get_version
        run: |
          echo "This is the ZSU variant"
          git clone https://github.com/Only7rb-Coder/ZSU.git KernelSU

          cd KernelSU

          # 计算KSU版本号
          KSU_GIT_VERSION=$(git rev-list --count HEAD)
          KSU_VERSION=$((30700 + KSU_GIT_VERSION))
          echo $KSU_VERSION
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV

          # 计算SUSFS版本号
          INFO="https://gitlab.com/simonpunk/susfs4ksu/-/raw/gki-android14-6.1/ksu_module_susfs/module.prop\?ref_type\=heads"
          SUS_VERSION=$(curl -s $INFO | awk -F '=' '$1 == "version" { print $2 }')
          echo $SUS_VERSION

          # 导出这两个值给release
          echo "kversion=$KSU_VERSION" >> $GITHUB_OUTPUT
          echo "sversion=$SUS_VERSION" >> $GITHUB_OUTPUT

      - name: 添加 KernelSU
        id: add_KSU
        continue-on-error: true
        run: |
          echo "ZSU..."
          REPO="Only7rb-Coder/ZSU"
          KSUM="Manager"
          FILENAME="build-manager.yml"
          
          # 初始化
          NUMBER=0
          DOWNLOAD_LIST=""

          echo "开始查找包含 'manager' 产物的构建..."
          while true; do
            echo "--------------------------------------------------"
            echo "正在检查第 ${NUMBER} 个历史构建 (0代表最新)..."

            if [ "$NUMBER" -ge 9 ]; then
              echo "查找九次仍然失败，跳出循环。"
              break
            fi

            BUILD_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/$REPO/actions/workflows/$FILENAME/runs?status=success" |
              jq -r '.workflow_runs['"$NUMBER"'].id')

            echo "找到构建 ID: $BUILD_ID"

            ARTIFACTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/$REPO/actions/runs/$BUILD_ID/artifacts")

            result=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name | contains("'"$KSUM"'")) | .name')

            if [ -z "$result" ]; then
              echo "没有找到包含 '$KSUM' 的项"
              NUMBER=$((NUMBER + 1))
            else
              echo "$result"
              DOWNLOAD_LIST=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name | contains("'"$KSUM"'")) | "\(.name)\t\(.archive_download_url)"')
              break
            fi
          done
         
          if [ -z "$DOWNLOAD_LIST" ]; then
            echo "未获取到可用的 Manager artifact 下载地址列表。"
            exit 1
          fi
          
          # 下载并解压所有 Manager 产物
          echo "$DOWNLOAD_LIST" | while IFS=$'\t' read -r NAME URL; do
            SAFE_NAME=$(echo "$NAME" | tr '/ ' '__')
            ZIP_NAME="ZSU-${SAFE_NAME}(${{ env.KSU_VERSION }}).zip"
            echo "下载 $NAME -> $ZIP_NAME"
            curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -o "$ZIP_NAME" "$URL"
            mkdir -p "manager-artifacts/$SAFE_NAME"
            unzip -o "$ZIP_NAME" -d "manager-artifacts/$SAFE_NAME"
            rm -rf "$ZIP_NAME"
          done

      - name: 提取 Manager 证书信息
        id: extract_cert
        if: steps.add_KSU.outcome == 'success'
        run: |
          # 找到第一个 Manager APK
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "未找到 Manager APK，将使用空证书信息"
            echo "expected_size=" >> $GITHUB_OUTPUT
            echo "expected_hash=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "找到 Manager APK: $APK_PATH"
          export APK_PATH
          python3 << 'PYEOF'
import hashlib, os, struct

apk_path = os.environ['APK_PATH']
if not apk_path or not os.path.exists(apk_path):
    with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
        f.write('expected_size=\n')
        f.write('expected_hash=\n')
    print('未找到 APK 文件')
    exit(0)

def get_apk_signature(path):
    """Parse APK Signing Block v2 to extract certificate (same as ksud apk_sign.rs)"""
    with open(path, 'rb') as f:
        data = f.read()
    
    file_len = len(data)
    
    # Find EOCD record (search backwards) — same logic as ksud
    i = 0
    eocd_offset = None
    while i <= 0xffff:
        n_pos = file_len - i - 2
        if n_pos < 0:
            break
        n = struct.unpack_from('<H', data, n_pos)[0]
        if n == i:
            # Check EOCD signature at offset (n_pos - 20)
            # In ksud: seek(End(-i-2)), read 2 bytes (pos now at file_len-i), seek(-22)
            # -> reads at file_len - i - 22
            eocd_check = n_pos - 20  # = file_len - i - 2 - 20 = file_len - i - 22
            if eocd_check >= 0 and struct.unpack_from('<I', data, eocd_check)[0] == 0x06054b50:
                eocd_offset = eocd_check
                break
        i += 1
    
    if eocd_offset is None:
        print('无法找到 EOCD 记录')
        return None
    
    # Read central directory offset
    cd_offset = struct.unpack_from('<I', data, eocd_offset + 16)[0]
    
    # Find APK Sig Block 42
    # pos = cd_offset - 0x18
    sig_block_pos = cd_offset - 0x18
    sig_block_size = struct.unpack_from('<Q', data, sig_block_pos)[0]
    magic = data[sig_block_pos + 8:sig_block_pos + 24]
    if magic != b'APK Sig Block 42':
        print(f'未找到 APK Sig Block 42, magic={magic}')
        return None
    
    # Parse signing block pairs
    # pos = cd_offset - (sig_block_size + 8)
    # Then read size_of_block (8 bytes), verify it matches sig_block_size
    pos = cd_offset - (sig_block_size + 8)
    read_size = struct.unpack_from('<Q', data, pos)[0]
    if read_size != sig_block_size:
        print(f'size mismatch: {read_size} != {sig_block_size}')
        return None
    pos += 8  # skip first size_of_block
    
    # Iterate over pairs
    while True:
        pair_size = struct.unpack_from('<Q', data, pos)[0]
        if pair_size == sig_block_size:
            break  # end marker
        
        pair_id = struct.unpack_from('<I', data, pos + 8)[0]
        
        if pair_id == 0x7109871a:  # V2 signing block
            # Parse V2 block — same as ksud calc_cert_sha256
            v2_pos = pos + 12  # after pair_size(8) + pair_id(4)
            
            offset = 4
            
            # signer-sequence length
            signer_seq_len = struct.unpack_from('<I', data, v2_pos)[0]
            v2_pos += 4
            
            # signer length
            signer_len = struct.unpack_from('<I', data, v2_pos)[0]
            v2_pos += 4
            
            # signed data length
            signed_data_len = struct.unpack_from('<I', data, v2_pos)[0]
            v2_pos += 4
            offset += 0x4 * 3  # 12
            
            # digests-sequence length
            digests_seq_len = struct.unpack_from('<I', data, v2_pos)[0]
            v2_pos += 4 + digests_seq_len  # skip digests
            offset += 0x4 + digests_seq_len
            
            # certificates length
            certs_len = struct.unpack_from('<I', data, v2_pos)[0]
            v2_pos += 4
            offset += 0x4
            
            # certificate length
            cert_len = struct.unpack_from('<I', data, v2_pos)[0]
            v2_pos += 4
            offset += 0x4
            
            # Read certificate
            cert_data = data[v2_pos:v2_pos + cert_len]
            if len(cert_data) != cert_len:
                print(f'证书读取不完整: {len(cert_data)} vs {cert_len}')
                return None
            
            return cert_data
        
        # Move to next pair: pos += pair_size - 4 (id bytes already consumed)
        pos += pair_size - 4
    
    print('未找到 V2 签名块')
    return None

cert = get_apk_signature(apk_path)
if cert is None:
    with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
        f.write('expected_size=\n')
        f.write('expected_hash=\n')
    print('证书提取失败')
    exit(0)

cert_len = len(cert)
size_hex = f'0x{cert_len:04x}'
sha256_hash = hashlib.sha256(cert).hexdigest()

print(f'证书大小: {size_hex} ({cert_len} bytes)')
print(f'SHA256: {sha256_hash}')

with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
    f.write(f'expected_size={size_hex}\n')
    f.write(f'expected_hash={sha256_hash}\n')
PYEOF
          echo "证书信息提取完成"

      - name: 添加 SUSFS 模块
        id: add_SUSFS
        continue-on-error: true
        run: |
          BUILD_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/workflows/build.yml/runs?status=success" |
          jq -r '.workflow_runs[0].id')

          ARTIFACTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/$BUILD_ID/artifacts")

          DOWNLOAD_URL=$(echo "$ARTIFACTS" | jq -r '.artifacts[0].archive_download_url') 

          NAME=$(echo "$ARTIFACTS" | jq -r '.artifacts[0].name')
          echo "SUSFS_NAME=$NAME" >> $GITHUB_ENV
          NAME="susfs-$NAME.zip"
          
          echo $DOWNLOAD_URL
          echo $NAME
          # 下载 Manager 文件
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -o "$NAME" "$DOWNLOAD_URL"
          echo "$NAME 文件已下载.zip"
          
          
          # 解压 artifact zip 获取里面的模块文件
          mkdir -p susfs-module
          unzip "$NAME" -d susfs-temp

          # 检查解压后的内容：如果是散装文件则打包成 zip
          cd susfs-temp
          if ls *.zip 1>/dev/null 2>&1; then
            # 里面已经是 zip 文件，直接移动
            mv *.zip ../susfs-module/
          else
            # 是散装文件，打包成 zip
            zip -r "../susfs-module/ksu_module_susfs.zip" .
          fi
          cd ..
          rm -rf susfs-temp "$NAME"

      - name: Notify on failure
        if: steps.add_KSU.outcome == 'failure'
        run: echo "下载CI构建的KSU失败!"

      - name: 上传APK
        if: steps.add_KSU.outcome == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: ZSU-Manager(${{ env.KSU_VERSION }})
          path: |
            **/*.apk

      - name: 上传SUSFS模块
        if: steps.add_SUSFS.outcome == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: susfs-${{ env.SUSFS_NAME }}
          path: ./susfs-module/*
